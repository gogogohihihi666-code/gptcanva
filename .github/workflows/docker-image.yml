name: Manual Docker image publication

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Full 40-character commit SHA to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish immutable commit image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IMAGE_NAME: couei/canana-vue
      IMAGE_TAG: sha-${{ inputs.release_commit }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_PROVIDER_DEFAULT_BASE_URL: ${{ vars.VITE_PROVIDER_DEFAULT_BASE_URL || 'https://api.chatfire.site/v1' }}

    steps:
      - name: Validate release commit
        shell: bash
        run: |
          if [[ ! "${{ inputs.release_commit }}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release_commit must be a full lowercase commit SHA."
            exit 1
          fi

      - name: Check out approved commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_commit }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_PROVIDER_DEFAULT_BASE_URL=${{ env.VITE_PROVIDER_DEFAULT_BASE_URL }}
