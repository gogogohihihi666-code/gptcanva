name: Manual production deployment

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Full 40-character commit SHA whose image was published
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy immutable commit image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Validate release commit
        shell: bash
        run: |
          if [[ ! "${{ inputs.release_commit }}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release_commit must be a full lowercase commit SHA."
            exit 1
          fi

      - name: Check out approved commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_commit }}

      - name: Validate deployment configuration
        shell: bash
        run: |
          required=(
            SERVER_HOST SERVER_USERNAME SERVER_SSH_KEY DEPLOY_PATH DATABASE_URL
            PROVIDER_CONFIG_SECRET STORAGE_CONFIG_SECRET VITE_API_BASE_URL
            CORS_ALLOWED_ORIGINS
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Required production configuration is missing: $name"
              exit 1
            fi
          done
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROVIDER_CONFIG_SECRET: ${{ secrets.PROVIDER_CONFIG_SECRET }}
          STORAGE_CONFIG_SECRET: ${{ secrets.STORAGE_CONFIG_SECRET }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}

      - name: Initialize deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -eu
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload compose definition
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"

            cat > .env <<'EOF'
            APP_IMAGE=couei/canana-vue:sha-${{ inputs.release_commit }}
            SERVER_PORT=5409
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_PROVIDER_DEFAULT_BASE_URL=https://api.chatfire.site/v1
            STATIC_DIST_DIR=/app/dist
            UPLOADS_DIR=/app/uploads
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PROVIDER_CONFIG_SECRET=${{ secrets.PROVIDER_CONFIG_SECRET }}
            STORAGE_CONFIG_SECRET=${{ secrets.STORAGE_CONFIG_SECRET }}
            REDIS_ENABLED=${{ secrets.REDIS_ENABLED }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_DATABASE=${{ secrets.REDIS_DATABASE }}
            REDIS_PREFIX=canana
            REDIS_ENV=production
            REDIS_DEFAULT_TTL_SECONDS=60
            REDIS_TASK_RUNTIME_TTL_SECONDS=1800
            REDIS_TASK_SNAPSHOT_TTL_SECONDS=1800
            REDIS_TASK_ABORT_TTL_SECONDS=300
            REDIS_TASK_LOCK_TTL_MS=30000
            AUTH_LOGIN_CODE_EXPIRE_MINUTES=5
            AUTH_SESSION_EXPIRE_DAYS=30
            EOF

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker ps
